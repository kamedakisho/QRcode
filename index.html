<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>医療フィットネス受付</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; background: #f5f7fb; }
    .header { background: #0068c9; color: white; padding: 28px; font-size: 36px; font-weight: bold; }
    h1 { font-size: 36px; margin: 30px 0; }
    #reader { width: 86%; max-width: 700px; margin: auto; background: white; }
    #message { margin: 28px auto; width: 86%; padding: 26px; border-radius: 8px; background: #2eae55; color: white; font-size: 32px; font-weight: bold; }
    #count { margin: 20px auto; width: 86%; padding: 26px; border-radius: 8px; background: #0068c9; color: white; font-size: 36px; font-weight: bold; }
  </style>
</head>

<body>
  <div class="header">医療フィットネス 受付</div>
  <h1>QRコードをかざしてください</h1>

  <div id="reader"></div>
  <div id="message">読み取り待機中</div>
  <div id="count">現在の来館人数：-- 人</div>

  <script>
    const GAS_API_URL = 'https://kamedakisho.github.io/QRcode/';

    let processing = false;
    let lastCode = '';
    let lastTime = 0;

    async function sendCheckIn(memberId) {
      const url = GAS_API_URL + '?id=' + encodeURIComponent(memberId);

      const res = await fetch(url);
      return await res.json();
    }

    async function onScanSuccess(decodedText) {
      const now = Date.now();

      if (processing) return;
      if (decodedText === lastCode && now - lastTime < 5000) return;

      processing = true;
      lastCode = decodedText;
      lastTime = now;

      document.getElementById('message').style.background = '#f0a000';
      document.getElementById('message').textContent = '確認中...';

      try {
        const result = await sendCheckIn(decodedText);

        document.getElementById('message').style.background = result.ok ? '#2eae55' : '#d93025';
        document.getElementById('message').textContent = result.message;
        document.getElementById('count').textContent = '現在の来館人数：' + result.count + '人';

      } catch (e) {
        document.getElementById('message').style.background = '#d93025';
        document.getElementById('message').textContent = '通信エラーです';
      }

      setTimeout(() => {
        document.getElementById('message').style.background = '#2eae55';
        document.getElementById('message').textContent = '読み取り待機中';
        processing = false;
      }, 2500);
    }

    const scanner = new Html5QrcodeScanner(
      "reader",
      {
        fps: 10,
        qrbox: { width: 300, height: 300 },
        rememberLastUsedCamera: true
      },
      false
    );

    scanner.render(onScanSuccess);
  </script>
</body>
</html>
